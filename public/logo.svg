<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Outer gold ring -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="url(#gold)" stroke-width="4"/>
  <!-- Inner green ring -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="#258D46" stroke-width="2"/>
  <!-- Navy background -->
  <circle cx="60" cy="60" r="46" fill="#0f172a"/>
  <!-- Sparkle stars -->
  <path d="M35 45l2 4 4 .5-3 2.5.5 4-3.5-2.5-3.5 2.5.5-4-3-2.5 4-.5z" fill="url(#gold)"/>
  <path d="M85 45l2 4 4 .5-3 2.5.5 4-3.5-2.5-3.5 2.5.5-4-3-2.5 4-.5z" fill="url(#gold)"/>
  <!-- Four-leaf clover - 4 circles, alternating gold/green -->
  <circle cx="60" cy="38" r="10" fill="url(#green)"/>
  <circle cx="60" cy="58" r="10" fill="url(#gold)"/>
  <circle cx="45" cy="48" r="10" fill="url(#gold)"/>
  <circle cx="75" cy="48" r="10" fill="url(#green)"/>
  <!-- Stem -->
  <path d="M60 64v8" stroke="#258D46" stroke-width="2" stroke-linecap="round"/>
  <!-- Green banner with gold outline -->
  <rect x="24" y="72" width="72" height="18" rx="3" fill="#258D46" stroke="url(#gold)" stroke-width="1.5"/>
  <text x="60" y="85" text-anchor="middle" fill="url(#gold)" font-weight="bold" font-size="14" font-family="system-ui,sans-serif">LOTOBRASIL</text>
  <!-- Three stars below -->
  <path d="M48 96l1.2 2.4 2.6.4-1.9 1.8.4 2.6-2.3-1.4-2.3 1.4.4-2.6-1.9-1.8 2.6-.4z" fill="url(#gold)"/>
  <path d="M60 98l1.2 2.4 2.6.4-1.9 1.8.4 2.6-2.3-1.4-2.3 1.4.4-2.6-1.9-1.8 2.6-.4z" fill="url(#gold)"/>
  <path d="M72 96l1.2 2.4 2.6.4-1.9 1.8.4 2.6-2.3-1.4-2.3 1.4.4-2.6-1.9-1.8 2.6-.4z" fill="url(#gold)"/>
</svg>
